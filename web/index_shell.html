<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1,
    minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover,
    interactive-widget=resizes-content">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>$GODOT_PROJECT_NAME</title>
  <style>
    :root { color-scheme:dark; --gold:#f3cf55; --track:#20242c; }
    * { box-sizing:border-box; }
    html, body {
      margin:0; padding:0; border:0; width:100vw; height:100vh; height:100dvh;
      min-width:100vw; min-height:100vh; min-height:100dvh;
      max-width:100vw; max-height:100vh; max-height:100dvh;
      -webkit-text-size-adjust:100%; text-size-adjust:100%;
    }
    body {
      position:fixed; inset:0; display:grid; place-items:center;
      overflow:hidden; background:#000; color:#fff;
      overscroll-behavior:none; touch-action:none;
    }
    #game-frame { position:fixed; transform-origin:0 0; }
    #canvas { display:block; max-width:none; max-height:none; }
    #canvas:focus { outline:none; }
    #mobile-name-input {
      position:fixed; z-index:30; left:50%; bottom:max(16px, env(safe-area-inset-bottom));
      display:none; width:min(86vw, 420px); transform:translateX(-50%); padding:10px 12px;
      border:2px solid var(--gold); border-radius:8px; background:#080d17; color:#fff;
      font:18px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }
    #status {
      position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
      background:radial-gradient(circle at 50% 42%, #10264b 0, #050b16 44%, #000 78%);
      visibility:hidden; font-family:ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }
    #loading-card {
      width:100%; height:100%; display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:max(24px, env(safe-area-inset-top)) max(28px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom)) max(28px, env(safe-area-inset-left));
    }
    #loading-logo { width:clamp(124px, 24vmin, 220px); height:auto; filter:drop-shadow(0 8px 22px #000c); }
    #loading-title {
      min-height:1.5em; margin:13px 0 3px; color:#fff; font-size:clamp(17px, 4vw, 22px);
      letter-spacing:.06em; text-align:center; animation:tip-breathe 1.8s ease-in-out infinite;
    }
    #loading-version { margin:0 0 20px; color:var(--gold); font-size:13px; letter-spacing:.08em; }
    #progress-row { width:min(72vw, 680px); display:none; align-items:center; gap:12px; }
    #status-progress {
      flex:1; height:9px; overflow:hidden; border:0; border-radius:999px;
      appearance:none; -webkit-appearance:none; background:var(--track); accent-color:var(--gold);
    }
    #status-progress::-webkit-progress-bar { background:var(--track); border-radius:999px; }
    #status-progress::-webkit-progress-value {
      border-radius:999px; background:linear-gradient(90deg, #b88624, var(--gold), #fff0a1);
      box-shadow:0 0 12px #f3cf5580;
    }
    #status-progress::-moz-progress-bar { border-radius:999px; background:var(--gold); }
    #progress-label { width:42px; color:var(--gold); font-size:12px; text-align:right; }
    #status-notice {
      display:none; width:100%; padding:12px; border:1px solid #9b3943; border-radius:8px;
      background:#5b394366; color:#f2dfe3; line-height:1.45; text-align:center;
    }
    @keyframes tip-breathe { 50% { opacity:.68; } }
    @media (max-height:430px) {
      #loading-card { padding:12px max(28px, env(safe-area-inset-right)) 12px max(28px, env(safe-area-inset-left)); }
      #loading-logo { width:96px; }
      #loading-title { margin-top:5px; font-size:20px; }
      #loading-version { margin-bottom:10px; }
      #progress-row { width:min(70vw, 620px); }
    }
  </style>
  $GODOT_HEAD_INCLUDE
</head>
<body>
  <div id="game-frame"><canvas id="canvas" width="640" height="480">你的浏览器不支持 Canvas。</canvas></div>
  <input id="mobile-name-input" type="text" inputmode="text" enterkeyhint="done" maxlength="10"
    autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="角色姓名">
  <noscript>前端群侠传需要启用 JavaScript。</noscript>
  <div id="status">
    <div id="loading-card">
      <img id="loading-logo" src="index.icon.png" alt="FrontendLegends Logo">
      <div id="loading-title">正在召唤前端大神</div>
      <div id="loading-version">v0.7.6</div>
      <div id="progress-row">
        <progress id="status-progress"></progress>
        <span id="progress-label">0%</span>
      </div>
      <div id="status-notice"></div>
    </div>
  </div>
  <script src="$GODOT_URL"></script>
  <script>
    const GODOT_CONFIG = $GODOT_CONFIG;
    const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
    const engine = new Engine(GODOT_CONFIG);
    const overlay = document.getElementById('status');
    const progressRow = document.getElementById('progress-row');
    const progress = document.getElementById('status-progress');
    const progressLabel = document.getElementById('progress-label');
    const loadingTitle = document.getElementById('loading-title');
    const notice = document.getElementById('status-notice');
    const gameFrame = document.getElementById('game-frame');
    const mobileNameInput = document.getElementById('mobile-name-input');
    const canvas = document.getElementById('canvas');
    const loadingTips = [
      '正在召唤前端大神', '实习牲已进场', '前端牛马已就位', '外包团队随时待命',
      '产品经理悄悄潜入', '客户正在骂骂咧咧', '老板随时准备入场', 'AI完成世界构建',
    ];
    const FAST_LOAD_THRESHOLD_MS = 2000;
    const FAST_LOAD_SHOWCASE_MS = 8000;
    const mobileBrowser = /Android|iPhone|iPad|Mobile|MicroMessenger/i.test(navigator.userAgent);
    const forceCssLandscape = new URLSearchParams(location.search).has('css-landscape-preview');
    let nameSubmission = 0;
    let cssLandscape = false;
    let canvasLayoutSignature = '';
    let actualLoadPercent = 0;
    let fastLoadPlayback = false;
    let loadingTicker = 0;
    const loadingStartedAt = performance.now();

    window.FrontendNameInput = {
      open(value) {
        mobileNameInput.value = value || '';
        mobileNameInput.style.display = 'block';
        try { mobileNameInput.focus({preventScroll:true}); } catch (_) { mobileNameInput.focus(); }
        mobileNameInput.setSelectionRange(mobileNameInput.value.length, mobileNameInput.value.length);
        return Number(mobileNameInput.dataset.submission);
      },
      value:() => mobileNameInput.value,
      submission:() => Number(mobileNameInput.dataset.submission),
      close() {
        mobileNameInput.blur();
        mobileNameInput.style.display = 'none';
        const canvas = document.getElementById('canvas');
        try { canvas.focus({preventScroll:true}); } catch (_) { canvas.focus(); }
      },
    };
    mobileNameInput.dataset.submission = '0';
    mobileNameInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        nameSubmission += 1;
        mobileNameInput.dataset.submission = String(nameSubmission);
      }
    });

    function refreshOrientation() {
      if (document.activeElement === mobileNameInput && canvasLayoutSignature) return;
      const viewport = window.visualViewport;
      const viewportWidth = viewport?.width || innerWidth;
      const viewportHeight = viewport?.height || innerHeight;
      const viewportLeft = viewport?.offsetLeft || 0;
      const viewportTop = viewport?.offsetTop || 0;
      const nextCssLandscape = forceCssLandscape || mobileBrowser && viewportHeight > viewportWidth;
      const naturalWidth = canvas.offsetWidth || canvas.width / (devicePixelRatio || 1);
      const naturalHeight = canvas.offsetHeight || canvas.height / (devicePixelRatio || 1);
      const availableHeight = nextCssLandscape ? viewportWidth : viewportHeight;
      // 固定按旋转后的可视高度生成唯一倍率，宽度严格使用相同倍率。
      const uniformScale = availableHeight / naturalHeight;
      const canvasWidth = naturalWidth * uniformScale;
      const canvasHeight = naturalHeight * uniformScale;
      const visualWidth = nextCssLandscape ? canvasHeight : canvasWidth;
      const visualHeight = nextCssLandscape ? canvasWidth : canvasHeight;
      const left = viewportLeft + (viewportWidth - visualWidth) / 2;
      const top = viewportTop + (viewportHeight - visualHeight) / 2;
      const signature = [viewportLeft, viewportTop, viewportWidth, viewportHeight,
        nextCssLandscape, naturalWidth, naturalHeight].join(':');
      cssLandscape = nextCssLandscape;
      document.documentElement.classList.toggle('css-landscape', cssLandscape);
      gameFrame.style.left = `${left}px`;
      gameFrame.style.top = `${top}px`;
      gameFrame.style.width = `${naturalWidth}px`;
      gameFrame.style.height = `${naturalHeight}px`;
      gameFrame.style.transform = cssLandscape
        ? `matrix(0, ${uniformScale}, ${-uniformScale}, 0, ${canvasHeight}, 0)`
        : `matrix(${uniformScale}, 0, 0, ${uniformScale}, 0, 0)`;
      if (signature !== canvasLayoutSignature) {
        canvasLayoutSignature = signature;
        requestAnimationFrame(() => dispatchEvent(new Event('resize')));
      }
    }
    async function requestLandscape() {
      try {
        const fullscreen = document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen;
        if (fullscreen && !document.fullscreenElement) await fullscreen.call(document.documentElement);
        if (screen.orientation?.lock) await screen.orientation.lock('landscape');
      } catch (_) {}
      refreshOrientation();
    }
    window.FrontendMobileOrientation = {request:requestLandscape, refresh:refreshOrientation};

    // Godot 只按旋转后的外接矩形缩放坐标；在捕获阶段交换并翻转坐标轴。
    function remapRotatedTouch(event) {
      if (!cssLandscape) return;
      const rect = canvas.getBoundingClientRect();
      for (const touch of event.changedTouches) {
        const clientX = rect.left + (touch.clientY - rect.top) * rect.width / rect.height;
        const clientY = rect.top + (rect.right - touch.clientX) * rect.height / rect.width;
        try {
          Object.defineProperties(touch, {
            clientX:{value:clientX, configurable:true},
            clientY:{value:clientY, configurable:true},
          });
        } catch (_) {}
      }
    }
    for (const type of ['touchstart', 'touchmove', 'touchend', 'touchcancel']) {
      canvas.addEventListener(type, remapRotatedTouch, {capture:true, passive:false});
    }
    addEventListener('resize', refreshOrientation);
    addEventListener('orientationchange', refreshOrientation);
    visualViewport?.addEventListener('resize', refreshOrientation);
    visualViewport?.addEventListener('scroll', refreshOrientation);
    refreshOrientation();

    function fail(error) {
      clearInterval(loadingTicker);
      console.error(error);
      progressRow.style.display = 'none';
      notice.style.display = 'block';
      notice.textContent = error instanceof Error ? error.message : String(error || '加载游戏时发生未知错误。');
    }

    const missing = Engine.getMissingFeatures({ threads:GODOT_THREADS_ENABLED });
    const invalidMobileBuild = mobileBrowser && GODOT_CONFIG.canvasResizePolicy !== 0;
    overlay.style.visibility = 'visible';
    if (invalidMobileBuild) {
      fail('移动 Web 构建配置无效，请使用 npm run build:web 重新完整构建。');
    } else if (missing.length) {
      fail(`当前浏览器缺少以下功能：\n${missing.join('\n')}`);
    } else {
      progressRow.style.display = 'flex';
      function showLoadingPercent(percent) {
        const boundedPercent = Math.max(0, Math.min(100, percent));
        progress.value = boundedPercent;
        progress.max = 100;
        progressLabel.textContent = `${Math.round(boundedPercent)}%`;
        const tipIndex = Math.min(loadingTips.length - 1,
          Math.floor(boundedPercent / (100 / loadingTips.length)));
        loadingTitle.textContent = loadingTips[tipIndex];
      }
      function refreshLoadingShowcase() {
        const elapsed = performance.now() - loadingStartedAt;
        if (fastLoadPlayback || elapsed < FAST_LOAD_THRESHOLD_MS) {
          showLoadingPercent(Math.min(actualLoadPercent, elapsed / FAST_LOAD_SHOWCASE_MS * 100));
        } else {
          showLoadingPercent(actualLoadPercent);
        }
      }
      loadingTicker = setInterval(refreshLoadingShowcase, 100);
      engine.startGame({
        onProgress(current, total) {
          if (current > 0 && total > 0) {
            actualLoadPercent = Math.min(100, current / total * 100);
            refreshLoadingShowcase();
          } else {
            progress.removeAttribute('value');
            progress.removeAttribute('max');
            progressLabel.textContent = '…';
          }
        },
      }).then(async () => {
        actualLoadPercent = 100;
        const elapsed = performance.now() - loadingStartedAt;
        if (elapsed < FAST_LOAD_THRESHOLD_MS) {
          fastLoadPlayback = true;
          await new Promise(resolve => setTimeout(resolve, FAST_LOAD_SHOWCASE_MS - elapsed));
        }
        showLoadingPercent(100);
        clearInterval(loadingTicker);
        overlay.remove();
        refreshOrientation();
      }, fail);
    }
  </script>
</body>
</html>
