<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>前端群侠传</title>
  <style>
    html, body, #canvas { margin: 0; padding: 0; border: 0; }
    body { background: #000; overflow: hidden; touch-action: none; }
    #canvas { display: block; }
    #canvas:focus { outline: none; }
  </style>
  $GODOT_HEAD_INCLUDE
</head>
<body>
  <canvas id="canvas">你的浏览器不支持 Canvas。</canvas>
  <noscript>前端群侠传需要启用 JavaScript。</noscript>
  <script src="$GODOT_URL"></script>
  <script>
    const engine = new Engine($GODOT_CONFIG);
    engine.startGame().catch((error) => console.error(error));
  </script>
</body>
</html>
